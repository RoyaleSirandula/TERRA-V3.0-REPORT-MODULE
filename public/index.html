<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Terra – AI-powered wildlife conservation reporting platform" />
  <title>Terra – Dashboard</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- App Stylesheets (load order matters) -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/reportDetail.css" />
  <link rel="stylesheet" href="css/siteAnalysis.css" />
  <link rel="stylesheet" href="css/analytics.css" />
  <link rel="stylesheet" href="css/users.css" />
  <link rel="stylesheet" href="css/roles.css" />
  <link rel="stylesheet" href="css/tacticalVp.css" />
  <link rel="stylesheet" href="css/map.css" />

  <!-- Leaflet.js (map) & Plugins -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
</head>

<body>

  <!-- ============================================================ -->
  <!-- APP SHELL                                                      -->
  <!-- ============================================================ -->
  <div class="app-shell" id="app-shell">

    <!-- SIDEBAR – injected by sidebar.js component -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Primary navigation">
      <!-- Content rendered by js/components/sidebar.js -->
    </aside>

    <!-- TOP BAR – injected by topbar.js component -->
    <header class="topbar" id="topbar">
      <!-- Content rendered by js/components/topbar.js -->
    </header>

    <!-- MAIN CONTENT – each page's content goes here -->
    <main class="main-content" id="page-content">
      <!-- Content injected by the active page module -->
    </main>

  </div>

  <!-- TOAST CONTAINER – global notifications -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- MODAL CONTAINER – global modal overlay -->
  <div id="modal-container"></div>

  <!-- ============================================================ -->
  <!-- JAVASCRIPT MODULES (deferred, bottom of body)               -->
  <!-- ============================================================ -->

  <!-- Utilities -->
  <script src="js/utils/auth.js"></script>
  <script src="js/utils/api.js"></script>
  <script src="js/utils/toast.js"></script>
  <script src="js/utils/modal.js"></script>

  <!-- CDN Libraries (load before widget modules) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Shared Components -->
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/topbar.js"></script>

  <!-- Widget System: Registry must load before individual widgets -->
  <script src="js/components/widgets/widgetRegistry.js"></script>
  <script src="js/components/widgets/statsWidget.js"></script>
  <script src="js/components/widgets/chartWidget.js"></script>
  <script src="js/components/widgets/mapWidget.js"></script>
  <script src="js/components/widgets/timelineWidget.js"></script>
  <script src="js/components/widgets/movebankWidget.js"></script>

  <!-- Page Modules -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/submitReport.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/reportDetail.js"></script>
  <script src="js/pages/siteAnalysis.js"></script>
  <script src="js/pages/analytics.js"></script>
  <script src="js/pages/users.js"></script>
  <script src="js/pages/roles.js"></script>

  <!-- Custom Overlay Scrollbar -->
  <script src="js/components/customScrollbar.js"></script>

  <!-- App Entry Point -->
  <script src="js/app.js"></script>
</body>

</html>
