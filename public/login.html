<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Terra – Sign in to the AI-powered wildlife conservation platform" />
    <title>Terra – Sign In</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />

    <!-- Design tokens only — no layout/components needed for this page -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>

<body class="login-body">

    <!-- Background ambient orbs (purely decorative, CSS-driven) -->
    <div class="login-orb login-orb--1" aria-hidden="true"></div>
    <div class="login-orb login-orb--2" aria-hidden="true"></div>

    <!-- Card -->
    <main class="login-card" id="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <img src="https://i.pinimg.com/736x/20/b9/ee/20b9ee6131cdb3521fc367f4b4c7da95.jpg" alt="Terra logo"
                style="height: 52px; width: auto; object-fit: contain;">
        </div>

        <h1 class="login-heading" id="login-heading">Sign in to Terra</h1>
        <p class="login-subheading" id="login-subheading">Wildlife Conservation Reporting Platform</p>

        <!-- Tab toggle: Sign In / Register -->
        <div class="login-tabs" role="tablist">
            <button class="login-tab active" id="tab-signin" role="tab" aria-selected="true" data-tab="signin">Sign
                In</button>
            <button class="login-tab" id="tab-register" role="tab" aria-selected="false"
                data-tab="register">Register</button>
        </div>

        <!-- ── Sign In Form ── -->
        <form class="login-form" id="signin-form" novalidate>
            <div class="login-field">
                <label class="login-label" for="signin-email">Email</label>
                <input class="login-input" id="signin-email" type="email" name="email" placeholder="you@example.com"
                    autocomplete="email" required />
            </div>

            <div class="login-field">
                <label class="login-label" for="signin-password">Password</label>
                <input class="login-input" id="signin-password" type="password" name="password" placeholder="••••••••"
                    autocomplete="current-password" required />
            </div>

            <p class="login-error" id="signin-error" role="alert"></p>

            <button class="login-btn" type="submit" id="signin-btn">
                <span class="login-btn__text">Sign In</span>
                <span class="login-btn__spinner" aria-hidden="true"></span>
            </button>
        </form>

        <!-- ── Register Form (hidden by default) ── -->
        <form class="login-form" id="register-form" style="display:none" novalidate>
            <div class="login-field">
                <label class="login-label" for="reg-username">Username</label>
                <input class="login-input" id="reg-username" type="text" name="username" placeholder="Your name"
                    autocomplete="username" required />
            </div>

            <div class="login-field">
                <label class="login-label" for="reg-email">Email</label>
                <input class="login-input" id="reg-email" type="email" name="email" placeholder="you@example.com"
                    autocomplete="email" required />
            </div>

            <div class="login-field">
                <label class="login-label" for="reg-password">Password</label>
                <input class="login-input" id="reg-password" type="password" name="password"
                    placeholder="Min 8 characters" autocomplete="new-password" required />
            </div>

            <div class="login-field">
                <label class="login-label" for="reg-role">Role</label>
                <select class="login-input login-select" id="reg-role" name="role">
                    <option value="COMMUNITY">Community Member</option>
                    <option value="RANGER">Ranger</option>
                    <option value="ANALYST">Analyst</option>
                </select>
                <span class="login-hint">Admin accounts are assigned by a system administrator.</span>
            </div>

            <p class="login-error" id="register-error" role="alert"></p>

            <button class="login-btn" type="submit" id="register-btn">
                <span class="login-btn__text">Create Account</span>
                <span class="login-btn__spinner" aria-hidden="true"></span>
            </button>
        </form>

        <p class="login-footer-note">
            By signing in you agree to Terra's data governance and conservation data policies.
        </p>

    </main>

    <script src="js/utils/auth.js"></script>
    <script src="js/pages/login.js"></script>
</body>

</html>
