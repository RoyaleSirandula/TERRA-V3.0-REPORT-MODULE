<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra – Welcome</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Open+Sans:wght@300;400;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --lime: #c8ff00;
      --dark: #070c0e;
      --panel-dark: #0a1114;
      --border: rgba(255, 255, 255, 0.322);
      --border-accent: rgba(200, 255, 0, 0.5);
      --text-dim: rgba(255, 255, 255, 0.5);
      --text-bright: #ffffff;
    }

    body {
      background: var(--dark);
      color: var(--text-bright);
      font-family: 'Open Sans', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Background Grid & Vignette */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px),
        url("https://i.pinimg.com/1200x/9c/15/86/9c15860ac27d7ddbd3f9cd8d3f4a929c.jpg");
      /* IMAGE */

      background-size:
        50px 50px,
        50px 50px,
        cover;
      /* image fills container */

      background-position:
        0 0,
        0 0,
        center;

      background-repeat:
        repeat,
        repeat,
        no-repeat;

      opacity: 0.2;
      z-index: 0;
    }

    .bg-glow {
      position: absolute;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 255, 0, 0.05) 0%, transparent 60%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 30%, var(--dark) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Center Content */
    .landing-center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Tactical Logo Placeholder */
    .logo-container {
      position: relative;
      width: 250px;
      height: 250px;
      margin-bottom: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Corner framing borders */
    .logo-frame {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 2px solid transparent;
      transition: border-color 0.3s ease;
    }

    .logo-frame.tl {
      top: 0;
      left: 0;
      border-top-color: var(--lime);
      border-left-color: var(--lime);
    }

    .logo-frame.tr {
      top: 0;
      right: 0;
      border-top-color: var(--lime);
      border-right-color: var(--lime);
    }

    .logo-frame.bl {
      bottom: 0;
      left: 0;
      border-bottom-color: var(--lime);
      border-left-color: var(--lime);
    }

    .logo-frame.br {
      bottom: 0;
      right: 0;
      border-bottom-color: var(--lime);
      border-right-color: var(--lime);
    }

    /* The logo image itself */
    .logo-img {
      width: 150%;
      height: 150%;
      object-fit: contain;
      z-index: 2;
      transition: filter 0.3s ease, transform 0.3s ease;
    }

    .logo-container:hover .logo-img {
      filter: drop-shadow(0 0 15px rgba(200, 255, 0, 0.4));
      transform: scale(1.05);
    }

    /* Typographic Elements */
    .pre-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 4px;
      color: var(--lime);
      margin-bottom: 15px;
      text-transform: uppercase;
    }



    .subtitle {
      font-size: 16px;
      color: var(--text-dim);
      letter-spacing: 1px;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 60px;
    }

    /* CTA Button */
    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      background: transparent;
      border: 1px solid var(--lime);
      color: var(--lime);
      padding: 16px 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--lime);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: -1;
    }

    .enter-btn:hover {
      color: #000;
    }

    .enter-btn:hover::before {
      transform: scaleX(1);
      transform-origin: left;
    }

    /* Corner UI Elements */
    .corner-ui {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      z-index: 10;
    }

    .ui-tl {
      top: 40px;
      left: 40px;
    }

    .ui-tr {
      top: 40px;
      right: 40px;
      text-align: right;
    }

    .ui-bl {
      bottom: 40px;
      left: 40px;
    }

    .ui-br {
      bottom: 40px;
      right: 40px;
      text-align: right;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--lime);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 10px var(--lime);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }

      100% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- Background Elements -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="vignette"></div>

  <!-- Tactical Corner UI -->
  <div class="corner-ui ui-tl">
    <span class="status-dot"></span>SYS_ONLINE
  </div>
  <div class="corner-ui ui-tr">
    LAT 1.2921°<br>LON 36.8219°
  </div>
  <div class="corner-ui ui-bl">
    TERRA // V3.0<br>ENCRYPTED
  </div>
  <div class="corner-ui ui-br">
    VER: OP-WILDLIFE-X
  </div>

  <!-- Main Center Content -->
  <div class="landing-center">

    <!-- Logo Placeholder -->
    <div class="logo-container" aria-label="Logo Space">




      <!-- Framers 
      <div class="logo-frame tl"></div>
      <div class="logo-frame tr"></div>
      <div class="logo-frame bl"></div>
      <div class="logo-frame br"></div>
-->




      <!-- Logo Image -->
      <img src="assets/MINI TERRA LOGO.png" alt="Terra Logo" class="logo-img">
    </div>

    <!-- Typography -->
    <div class="pre-title">Conservation Intelligence</div>
    <p class="subtitle">
      AI-verified intelligence and on-the-fly geospatial analytics for proactive, mathematically-driven conservation
      strategies.
    </p>

    <!-- Action -->
    <a href="testing2.html" class="enter-btn">
      Initialize System
    </a>

  </div>

</body>

</html>
